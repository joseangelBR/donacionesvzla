<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ayuda para Venezuela</title>
  <meta name="robots" content="noindex">
  <style>
    html,body{margin:0;padding:0;background:transparent}
    body{padding:8px}
    #app{max-width:640px;margin:0 auto}
  </style>
</head>
<body>
  <!--
    Versión iframe. Para incrustar en cualquier sitio (incluido Wix "Embed HTML"):
    <iframe src="https://donaciones-vzla.pages.dev/embed.html?lang=es"
            style="width:100%;max-width:640px;height:640px;border:0" loading="lazy"
            title="Ayuda para Venezuela"></iframe>
    Lee el mismo config.json remoto → se actualiza solo.
  -->
  <div id="app"></div>

  <script>
    (function () {
      var q = new URLSearchParams(location.search);
      var lang = (q.get('lang') || '').toLowerCase();
      var cats = q.get('categories') || '';
      var orgs = q.get('orgs') || '';
      function list(v) { return v ? v.split(',').map(function (x) { return x.trim(); }).filter(Boolean) : []; }

      var s = document.createElement('script');
      s.src = 'widget.js';
      s.setAttribute('data-mode', 'manual');
      s.onload = function () {
        if (window.DonacionesVzla && window.DonacionesVzla.mount) {
          window.DonacionesVzla.mount({
            mode: 'inline',
            target: '#app',
            lang: lang,
            categories: list(cats),
            orgs: list(orgs)
          });
        }
      };
      document.body.appendChild(s);
    })();
  </script>
</body>
</html>
